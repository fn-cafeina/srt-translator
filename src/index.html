<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>SRT Translator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>SRT Translator</h1>
      </div>

      <div class="grid">
        <div class="field">
          <label for="apiKey"><i data-lucide="key" style="width:14px;height:14px;"></i> API Key</label>
          <input type="password" id="apiKey" placeholder="AIzaSy..." required />
        </div>

        <div class="field">
          <label for="file"><i data-lucide="file-up" style="width:14px;height:14px;"></i> SRT File</label>
          <input type="file" id="file" accept=".srt" required />
        </div>
      </div>

      <div class="controls">
        <button id="start" class="btn-primary"><i data-lucide="play" style="width:14px;height:14px;margin-right:4px;"></i> Start</button>
        <button id="stop" class="btn-stop" disabled><i data-lucide="square" style="width:14px;height:14px;margin-right:4px;"></i> Stop</button>
      </div>

      <div class="status">
        <div class="progress-bg">
          <div id="progress" class="progress-fill"></div>
        </div>

        <div class="status-text">
          <span id="progressText">0 / 0 lines</span>
          <span id="eta">ETA --:--</span>
        </div>
      </div>

    <div class="workspace">
        <div class="panel">
          <div class="panel-header"><i data-lucide="terminal" style="width:14px;height:14px;margin-right:4px;"></i> Console</div>
          <div id="log" class="panel-content"></div>
        </div>

        <div class="panel">
          <div class="panel-header"><i data-lucide="file-text" style="width:14px;height:14px;margin-right:4px;"></i> Preview</div>
          <textarea id="preview" readonly></textarea>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
